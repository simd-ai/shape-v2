# Ablation Run 1 — MSE + RAW targets (no per-dim normalization)
# Expected: masked_token loss dominated by curvature outliers, diverges or
# plateaus at ~10^4. This is the "broken baseline" that motivates both fixes.
input:
  num_surface_points: 4096

tokenizer:
  latent:
    latent_shape: [24, 24, 24]
    token_dim: 128
  neighbor:
    multiscale_radii: [0.05, 0.1, 0.2]
  agno:
    num_heads: 4

processor:
  hidden_size: 128
  num_layers: 3
  num_heads: 4
  num_kv_heads: 2
  patch_size: 6

heads:
  embedding_dim: 128
  pooling: attention
  symmetry:
    hidden_dim: 128
  primitive:
    hidden_dim: 128
  part:
    hidden_dim: 128
  caption:
    hidden_dim: 128
  reduction:
    hidden_dim: 128

train:
  epochs: 20                                        # shorter for ablation
  batch_size: 16
  gradient_accumulation_steps: 2
  mixed_precision: bf16
  num_workers: 4
  pin_memory: true
  checkpoint_dir: /data/shape-v2/ablations/run1_mse_raw/checkpoints
  log_dir: /data/shape-v2/ablations/run1_mse_raw/runs
  optimizer:
    lr: 3.0e-4
    warmup_steps: 500
  loss:
    inpainting:
      enabled: false
    regression:
      kind: mse                                      # ★ MSE
      beta: 1.0
    recon_target_norm:
      enabled: false                                 # ★ RAW (no normalization)
    weights:
      masked_token: 1.0
      contrastive: 0.2
      inpainting: 0.0
  wandb:
    enabled: true
    project: shape-foundation-ablations
    name: run1_mse_raw
    tags: [ablation, small, mse, raw]

data:
  val_fraction: 0.05
  sources:
    - name: thingi10k
      root: data_cache/thingi10k/thingi10k
      weight: 1.0
    - name: mfcad
      root: data_cache/mfcad/mfcad
      weight: 1.0
    - name: fusion360
      root: data_cache/fusion360/fusion360
      weight: 0.5
